# fly.toml app configuration file generated for playlistmaker on 2026-07-03T17:25:11-10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'playlistmaker'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'get'
    path = '/api/health'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
